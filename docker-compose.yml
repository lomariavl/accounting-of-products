version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: postgresql
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: mydb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  api:
    build: .
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://admin:admin123@localhost:5433/mydb
    ports:
      - "8000:8000"
volumes:
  pgdata: